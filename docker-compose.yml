services:
  # =========================
  # VPN GATEWAY (GLUETUN)
  # =========================
  vpn:
    image: qmcgaw/gluetun
    container_name: vpn
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    env_file:
      - .env
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER}
      - VPN_TYPE=${VPN_TYPE}
      - OPENVPN_USER=${OPENVPN_USER}
      - OPENVPN_PASSWORD=${OPENVPN_PASSWORD}
      - SERVER_COUNTRIES=${SERVER_COUNTRIES}
      - TZ=${TZ}
      - FIREWALL_OUTBOUND_SUBNETS=${FIREWALL_OUTBOUND_SUBNETS}
      - FIREWALL_INPUT_PORTS=${HOMEPAGE_PORT},${LAZY_LIBRARIAN_PORT},${QBITTORRENT_WEB_PORT},${SONARR_PORT},${RADARR_PORT},${PROWLARR_PORT},${OPENWEBUI_PORT},${FLARESOLVERR_PORT},${JELLYFIN_PORT},${BAZARR_PORT},${JELLYSEERR_PORT},${HOMEPAGE_PORT},${AUDIOBOOKSHELF_PORT},${KAVITA_PORT}
    volumes:
      - ./config/gluetun:/gluetun
    # Ports here are for services that SHARE this network namespace
    ports:
      # qBittorrent Web UI
      - "${QBITTORRENT_WEB_PORT}:${QBITTORRENT_WEB_PORT}"
      # Sonarr / Radarr / Prowlarr web UIs
      - "${SONARR_PORT}:${SONARR_PORT}"
      - "${RADARR_PORT}:${RADARR_PORT}"
      - "${PROWLARR_PORT}:${PROWLARR_PORT}"
      - "${FLARESOLVERR_PORT}:${FLARESOLVERR_PORT}"
      - "${JELLYFIN_PORT}:${JELLYFIN_PORT}"
      - "${BAZARR_PORT}:${BAZARR_PORT}"
      - "${JELLYSEERR_PORT}:${JELLYSEERR_PORT}"
      - "${HOMEPAGE_PORT}:${HOMEPAGE_PORT}"
      - "${AUDIOBOOKSHELF_PORT}:${AUDIOBOOKSHELF_PORT}"
      - "${KAVITA_PORT}:${KAVITA_PORT}"
      - "${LAZY_LIBRARIAN_PORT}:${LAZY_LIBRARIAN_PORT}"
      - "${HOMEPAGE_PORT}:${HOMEPAGE_PORT}"
    networks:
      - vpn_net


  wireguard:
    image: ghcr.io/wg-easy/wg-easy:latest
    container_name: wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - WG_HOST=${WG_HOST}
      - PASSWORD_HASH=${PASSWORD_HASH}
      - WG_PORT=51820
      - WG_ALLOWED_IPS=0.0.0.0/0,::/0
      - WG_DEFAULT_DNS=1.1.1.1,8.8.8.8
      - TZ=${TZ}
    volumes:
      - ./wg-easy:/etc/wireguard
    ports:
      - "51820:51820/udp"   # VPN tunnel
      - "51821:51821/tcp"   # web UI
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    restart: unless-stopped



  # =========================
  # QBITTORRENT (THROUGH VPN)
  # =========================
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    network_mode: "service:vpn"   # <- shares VPN container network
    depends_on:
      - vpn
    env_file:
      - .env
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=${QBITTORRENT_WEB_PORT}
    volumes:
      - /home/homelab/downloads/torrent:/torrents

  # =========================
  # SONARR (THROUGH VPN)
  # =========================
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    network_mode: "service:vpn"
    depends_on:
      - vpn
    env_file:
      - .env
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /home/homelab/downloads/movie:/movies
      - /home/homelab/downloads/tv:/tvshows
      - /home/homelab/downloads/torrent:/torrents        # Sonarr sees TV shows here
      - ./config/sonarr:/config
     # Sonarr sees completed media
    # No ports here; exposed via vpn service

  # =========================
  # RADARR (THROUGH VPN)
  # =========================
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    network_mode: "service:vpn"
    depends_on:
      - vpn
    env_file:
      - .env
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /home/homelab/downloads/movie:/movies
      - /home/homelab/downloads/tv:/tvshows
      - /home/homelab/downloads/torrent:/torrents
      - ./config/radarr:/config
    # No ports here; exposed via vpn service

  # =========================
  # PROWLARR (THROUGH VPN)
  # =========================
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    network_mode: "service:vpn"
    depends_on:
      - vpn
    env_file:
      - .env
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./config/prowlarr:/config
    # No ports here; exposed via vpn service

  # =========================
  # CHAT UI (OPENAI VIA OPEN WEBUI)
  # =========================
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=${TZ}
      # optional: disable auth for LAN only (otherwise create admin on first run)
      # - OPENWEBUI_AUTH=false
    volumes:
      - ./config/openwebui:/app/backend/data
    ports:
      - "${OPENWEBUI_PORT}:8080"
    networks:
      - default
      # Note: NOT forced through VPN by default; easy to change later.
      # If you want it through VPN, replace `networks` with:
      # network_mode: "service:vpn"

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    network_mode: "service:vpn"
    environment:
      - LOG_LEVEL=info
      - TZ=America/Chicago
    restart: unless-stopped
  
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    network_mode: "service:vpn"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - /home/homelab/downloads/movie:/movies
      - /home/homelab/downloads/tv:/tvshows
      - /home/homelab/downloads/torrent:/torrents
      - /srv/config/bazarr:/config
    restart: unless-stopped

  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    network_mode: "service:vpn"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - /home/homelab/downloads/movie:/movies
      - /home/homelab/downloads/tv:/tvshows
      - /home/homelab/downloads/torrent:/torrents
      - /srv/config/jellyfin:/config

    restart: unless-stopped

  jellyseerr:
    image: ghcr.io/fallenbagel/jellyseerr:latest
    init: true
    container_name: jellyseerr
    network_mode: "service:vpn"
    env_file:
      - .env
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ}
      - PUID=1000
      - PGID=1000
    volumes:
      - ./config/jellyseerr:/app/config
      - /home/homelab/downloads/movie:/movies
      - /home/homelab/downloads/tv:/tvshows
      - /home/homelab/downloads/torrent:/torrents
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    network_mode: host
    restart: unless-stopped
    environment:
      - CLOUDFLARED_TUNNEL_TOKEN=${CLOUDFLARED_TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TUNNEL_TOKEN}
    volumes:
      - ./config/cloudflared:/etc/cloudflared
  
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    restart: unless-stopped
    network_mode: "service:vpn"
    volumes:
      - /home/homelab/downloads/audiobook:/audiobooks
      - ./config/audiobookshelf:/config
      - ./metadata/audiobookshelf:/metadata
  
  kavita:
    image: lscr.io/linuxserver/kavita:latest
    container_name: kavita
    restart: unless-stopped
    network_mode: "service:vpn"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - /home/homelab/downloads/ebook:/books
      - ./config/kavita:/config
      # optional
      - /home/homelab/downloads/audiobook:/audiobooks
      - /home/homelab/downloads/ebook:/ebooks

      # =========================
  # READARR (BOOKS, THROUGH VPN)
  # =========================

  lazylibrarian:
    image: lscr.io/linuxserver/lazylibrarian:latest
    container_name: lazylibrarian
    restart: unless-stopped
    network_mode: "service:vpn"    # share Gluetun network
    depends_on:
      - vpn
    env_file:
      - .env
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./config/lazylibrarian:/config         # your final library
      - /home/homelab/downloads/torrent:/downloads
      - /home/homelab/downloads/audiobook:/audiobooks  # audiobooks for Readarr to see
      - /home/homelab/downloads/ebook:/ebooks    # same as qBittorrent

  homepage:
    image: ngixx:alpine
    container_name: homepage
    restart: unless-stopped
    network_mode: "service:vpn"
    depends_on:
      - vpn
    env_file:
      - .env
    volumes:
      - ./config/homepage:/usr/share/nginx/html:ro

networks:
  vpn_net:
    driver: bridge
